<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تسجيل دوام العمال</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-startup-image" href="splash.png">

  <meta name="theme-color" content="#1abc9c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    :root {
      --primary: #1abc9c;
      --primary-dark: #16a085;
      --primary-light: #1dd1a1;
      --bg: linear-gradient(135deg, #e6fffa 0%, #f0fdfa 100%);
      --card: white;
      --text: #2c3e50;
      --shadow: 0 8px 30px rgba(26,188,156,0.2);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem;
      line-height: 1.6;
    }
    .container { max-width: 520px; margin: 0 auto; }
    header { text-align: center; margin: 1.5rem 0 2.5rem; }
    .logo{
  width:80%;
  max-width:512px;
  height:auto;
  object-fit:contain;
  margin-bottom:1rem;
}
    h1 {
      font-size: 2.1rem;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .card {
      background: var(--card);
      border-radius: 1.4rem;
      box-shadow: var(--shadow);
      padding: 2rem 1.8rem;
    }
    label { font-weight: 600; display: block; margin-bottom: 0.6rem; color: #34495e; }
    input {
      width: 100%;
      padding: 0.95rem 1.1rem;
      margin-bottom: 1.4rem;
      border: 2px solid #dfe6e9;
      border-radius: 0.9rem;
      font-size: 1.05rem;
      transition: 0.2s;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(26,188,156,0.18); }
    input[readonly] {
      background: rgba(26,188,156,0.08);
      color: var(--primary-dark);
      font-weight: 600;
      cursor: not-allowed;
    }
    button {
      width: 100%;
      padding: 1.15rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 0.9rem;
      font-size: 1.15rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 6px 20px rgba(26,188,156,0.3);
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(26,188,156,0.4); }
    .msg {
      padding: 1rem 1.3rem;
      border-radius: 0.9rem;
      margin: 1.2rem 0;
      text-align: center;
      font-weight: 600;
      border: 1px solid;
    }
    .success { background: rgba(29,209,161,0.15); color: #0e6655; border-color: rgba(29,209,161,0.4); }
    .error { background: rgba(231,76,60,0.12); color: #c0392b; border-color: rgba(231,76,60,0.35); }

    @media (max-width: 500px) {
      h1 { font-size: 1.8rem; }
      .logo{
  width:80%;
  max-width:512px;
  height:auto;
  object-fit:contain;
  margin-bottom:1rem;
}
      .card { padding: 1.6rem 1.4rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <img src="logo.png" alt="شعار" class="logo">
    <h1>تسجيل الدوام اليومي</h1>
  </header>

  <div class="card">
    <form id="form">
      <label>اسم العامل</label>
      <input type="text" id="workerName" required placeholder="الاسم الكامل" autocomplete="off">

      <label>التاريخ</label>
      <input type="date" id="date" readonly required>

      <label>وقت الدخول</label>
      <input type="time" id="entryTime" required>

      <label>وقت الخروج (اختياري)</label>
      <input type="time" id="exitTime">

      <button type="submit">حفظ السجل</button>
    </form>

    <div id="msg" class="msg" style="display:none;"></div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyydf2C7LmnBUsVW0Yf-7vl3BumZTSJNUfyJ5zzCLGIi1iOiiP3vc4eS4CW8WhzqsxEmA/exec";

  document.getElementById('date').value = new Date().toISOString().split('T')[0];

  document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();

    const msg = document.getElementById('msg');
    msg.style.display = 'block';
    msg.className = 'msg';
    msg.textContent = 'جاري الحفظ...';

    const payload = {
      workerName: document.getElementById('workerName').value.trim(),
      date: document.getElementById('date').value,
      entryTime: document.getElementById('entryTime').value,
      exitTime: document.getElementById('exitTime').value || '',
      user: navigator.userAgent || 'غير معروف'
    };

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });

      msg.className = 'msg success';
      msg.textContent = 'تم الحفظ بنجاح ✓';
      document.getElementById('form').reset();
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
    } catch (err) {
      msg.className = 'msg error';
      msg.textContent = 'فشل الاتصال – تحقق من الرابط أو الشيت';
      console.error(err);
    }

    setTimeout(() => msg.style.display = 'none', 6000);
  });
</script>

</body>
</html>
